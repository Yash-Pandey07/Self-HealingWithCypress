name: Self-Healing Automation Dashboard CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Self-Healing Tests
        # We use a try-catch pattern so even if tests "fail" (business logic), we still get the healing report
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CYPRESS_env should match what your code expects
          CYPRESS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run cy:run

      - name: Upload Current Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healing-results
          path: cypress/reports/healing-results.json

      - name: Checkout Dashboard Data Branch
        uses: actions/checkout@v4
        with:
          ref: dashboard-data
          path: data-branch

      - name: Process Historical Data
        run: |
          # Copy current results to tools working dir
          cp cypress/reports/healing-results.json src/tools/
          # Copy existing history to tools working dir
          cp data-branch/history.json src/tools/ || echo "[]" > src/tools/history.json
          
          # Run the aggregator script
          node src/tools/generate-historical-data.js
          
          # Copy updated history back to data-branch
          cp src/tools/history.json data-branch/
          # Ensure runs directory exists and copy run specific JSON
          mkdir -p data-branch/runs
          cp src/tools/runs/* data-branch/runs/ || true

      - name: Commit and Push History to Data Branch
        run: |
          cd data-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json runs/
          git commit -m "chore: update history for run ${{ github.run_id }}" || echo "No changes to commit"
          git push origin dashboard-data

      - name: Deploy Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          # We copy the history.json into the dashboard folder so the HTML can reach it easily
          # In this setup, we might need a step to move history.json into dashboard/ before deploying
          
      - name: Finalize Dashboard Deployment
        run: |
          # Prepare the dashboard folder for deployment with the latest data
          cp data-branch/history.json dashboard/
          
      - name: Push to GH-Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
