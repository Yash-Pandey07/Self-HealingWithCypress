name: Self-Healing Automation Dashboard CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Self-Healing Tests
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CYPRESS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run cy:run

      - name: Upload Current Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healing-results
          path: cypress/reports/healing-results.json

      - name: Ensure dashboard-data branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin dashboard-data; then
            git switch --orphan dashboard-data
            echo '[]' > history.json
            echo '{}' > latest.json
            mkdir -p runs
            git add history.json latest.json
            git commit -m "chore: initialize dashboard-data branch"
            git push origin dashboard-data
            git switch -
          fi

      - name: Checkout Dashboard Data Branch
        uses: actions/checkout@v4
        with:
          ref: dashboard-data
          path: data-branch

      - name: Process Historical Data
        run: |
          cp cypress/reports/healing-results.json src/tools/
          cp data-branch/history.json src/tools/ || echo '[]' > src/tools/history.json
          node src/tools/generate-historical-data.js
          cp src/tools/history.json data-branch/
          cp src/tools/latest.json data-branch/
          mkdir -p data-branch/runs
          cp src/tools/runs/* data-branch/runs/ || true

      - name: Commit and Push History to Data Branch
        run: |
          cd data-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json latest.json runs/
          git commit -m "chore: update history for run ${{ github.run_id }}" || echo "No changes to commit"
          git push origin dashboard-data

      - name: Prepare Dashboard Data
        run: |
          cp data-branch/history.json dashboard/
          cp data-branch/latest.json dashboard/
          mkdir -p dashboard/runs
          cp data-branch/runs/* dashboard/runs/ || true

      - name: Deploy Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
